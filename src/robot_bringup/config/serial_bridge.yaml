mega_bridge_node:
  ros__parameters:
    port: /dev/rfcomm0
    baudrate: 9600
    cmd_vel_topic: /cmd_vel
    status_topic: /base/status
    odom_topic: /odom
    odom_raw_topic: /odom/raw
    imu_raw_topic: /imu/data_raw
    odom_frame_id: odom
    base_frame_id: base_link
    imu_frame_id: base_link
    publish_odom_tf: true
    wheel_radius: 0.0425
    wheel_separation: 0.42
    encoder_ticks_per_rev: 1320.0
    reverse_left_ticks: false
    reverse_right_ticks: false
    auto_detect_encoder_direction: true
    encoder_direction_min_delta_ticks: 3
    write_rate_hz: 20.0
    read_rate_hz: 50.0
    cmd_vel_timeout_sec: 0.8
    serial_reconnect_sec: 3.0
    serial_exclusive: true
    serial_startup_delay_sec: 0.0
    read_enabled: true
    max_linear_speed_mps: 0.16
    max_angular_speed_radps: 0.85
    reject_encoder_jump: true
    max_tick_delta: 5000
