usb_camera_node:
	ros__parameters:
		camera_index: 0
		frame_id: camera_link
		width: 640
		height: 480
		fps: 30.0
		image_topic: /camera/image_raw

bottle_detector_node:
	ros__parameters:
		image_topic: /camera/image_raw
		debug_image_topic: /camera/detections
		conf_threshold: 0.35
		iou_threshold: 0.45
		device: cpu

